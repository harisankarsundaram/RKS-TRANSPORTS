apiVersion: apps/v1
kind: Deployment
metadata:
  name: mock-gps-service
  namespace: rks-logistics
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mock-gps-service
  template:
    metadata:
      labels:
        app: mock-gps-service
    spec:
      containers:
        - name: mock-gps-service
          image: DOCKERHUB_USERNAME/rks-mock-gps-service:latest
          ports:
            - containerPort: 3206
          envFrom:
            - configMapRef:
                name: rks-shared-config
            - secretRef:
                name: rks-shared-secrets
          env:
            - name: PORT
              value: "3206"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: rks-shared-secrets
                  key: DATABASE_URL
