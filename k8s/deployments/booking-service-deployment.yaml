apiVersion: apps/v1
kind: Deployment
metadata:
  name: booking-service
  namespace: rks-logistics
spec:
  replicas: 1
  selector:
    matchLabels:
      app: booking-service
  template:
    metadata:
      labels:
        app: booking-service
    spec:
      containers:
        - name: booking-service
          image: docker.io/harisankarsundaram/rks-booking-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3204
          envFrom:
            - configMapRef:
                name: rks-shared-config
            - secretRef:
                name: rks-shared-secrets
          env:
            - name: PORT
              value: "3204"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: rks-shared-secrets
                  key: DATABASE_URL
