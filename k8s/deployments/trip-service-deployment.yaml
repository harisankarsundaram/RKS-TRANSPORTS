apiVersion: apps/v1
kind: Deployment
metadata:
  name: trip-service
  namespace: rks-logistics
spec:
  replicas: 1
  selector:
    matchLabels:
      app: trip-service
  template:
    metadata:
      labels:
        app: trip-service
    spec:
      containers:
        - name: trip-service
          image: docker.io/harisankarsundaram/rks-trip-service:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 3203
          envFrom:
            - configMapRef:
                name: rks-shared-config
            - secretRef:
                name: rks-shared-secrets
          env:
            - name: PORT
              value: "3203"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: rks-shared-secrets
                  key: DATABASE_URL
