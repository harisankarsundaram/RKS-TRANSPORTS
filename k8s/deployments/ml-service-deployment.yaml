apiVersion: apps/v1
kind: Deployment
metadata:
  name: ml-service
  namespace: rks-logistics
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ml-service
  template:
    metadata:
      labels:
        app: ml-service
    spec:
      containers:
        - name: ml-service
          image: DOCKERHUB_USERNAME/rks-ml-service:latest
          ports:
            - containerPort: 8000
          env:
            - name: PYTHONUNBUFFERED
              value: "1"
