apiVersion: v1
kind: ConfigMap
metadata:
  name: rks-prometheus-config
  namespace: rks-logistics
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s

    scrape_configs:
      - job_name: prometheus
        static_configs:
          - targets: ["prometheus:9090"]

      - job_name: blackbox-exporter
        static_configs:
          - targets: ["blackbox-exporter:9115"]

      - job_name: blackbox-http-health
        metrics_path: /probe
        params:
          module: [http_2xx]
        static_configs:
          - targets:
              - http://api-gateway:80/health
              - http://auth-service:80/health
              - http://fleet-service:80/health
              - http://trip-service:80/health
              - http://booking-service:80/health
              - http://tracking-service:80/health
              - http://mock-gps-service:80/health
              - http://analytics-service:80/health
              - http://alert-service:80/health
              - http://optimization-service:80/health
              - http://ml-service:8000/health
              - http://frontend:80/
        relabel_configs:
          - source_labels: [__address__]
            target_label: __param_target
          - source_labels: [__param_target]
            target_label: instance
          - target_label: __address__
            replacement: blackbox-exporter:9115

      - job_name: blackbox-platform-health
        metrics_path: /probe
        params:
          module: [http_2xx]
        static_configs:
          - targets:
              - http://prometheus:9090/-/healthy
              - http://grafana:3000/api/health
              - http://blackbox-exporter:9115/-/healthy
        relabel_configs:
          - source_labels: [__address__]
            target_label: __param_target
          - source_labels: [__param_target]
            target_label: instance
          - target_label: __address__
            replacement: blackbox-exporter:9115
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: rks-blackbox-config
  namespace: rks-logistics
data:
  blackbox.yml: |
    modules:
      http_2xx:
        prober: http
        timeout: 10s
        http:
          method: GET
          valid_status_codes: [200]
          preferred_ip_protocol: ip4
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: rks-grafana-datasource
  namespace: rks-logistics
data:
  datasource.yml: |
    apiVersion: 1

    datasources:
      - name: Prometheus
        type: prometheus
        access: proxy
        url: http://prometheus:9090
        isDefault: true
        editable: true
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: rks-grafana-dashboard-provider
  namespace: rks-logistics
data:
  dashboards.yml: |
    apiVersion: 1

    providers:
      - name: rks-observability
        orgId: 1
        folder: RKS Logistics
        type: file
        disableDeletion: false
        updateIntervalSeconds: 10
        allowUiUpdates: true
        options:
          path: /var/lib/grafana/dashboards
---
