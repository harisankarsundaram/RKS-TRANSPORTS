apiVersion: apps/v1
kind: Deployment
metadata:
  name: ml-service
  namespace: rks-logistics
  labels:
    app: ml-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ml-service
  template:
    metadata:
      labels:
        app: ml-service
    spec:
      containers:
        - name: ml-service
          image: your-registry/rks-ml-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          env:
            - name: PYTHONUNBUFFERED
              value: "1"
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 25
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: ml-service
  namespace: rks-logistics
spec:
  type: ClusterIP
  selector:
    app: ml-service
  ports:
    - name: http
      port: 8000
      targetPort: 8000
      protocol: TCP
