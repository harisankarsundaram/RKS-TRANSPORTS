services:
  jenkins:
    build:
      context: ./jenkins
      dockerfile: Dockerfile
    container_name: rks-jenkins
    restart: unless-stopped
    user: root
    ports:
      - "8080:8080"
      - "50000:50000"
    volumes:
      - jenkins_home:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
      - ../:/workspace
      - ${USERPROFILE}/.kube:/root/.kube:ro
      - ${USERPROFILE}/.minikube:/root/.minikube:ro

volumes:
  jenkins_home:
