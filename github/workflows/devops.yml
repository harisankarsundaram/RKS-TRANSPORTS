name: DevOps CI Pipeline

on:
  push:
    branches:
      - devops
  pull_request:
    branches:
      - devops

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    env:
      IMAGE_REGISTRY: docker.io/harisankarsundaram
      IMAGE_TAG: ${{ github.run_number }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install Dependencies
        run: |
          echo "Installing dependencies..."

          for dir in \
            services/api-gateway \
            services/auth-service \
            services/fleet-service \
            services/trip-service \
            services/booking-service \
            services/tracking-service \
            services/mock-gps-service \
            services/analytics-service \
            services/alert-service \
            services/optimization-service \
            frontend; do
            if [ -f "$dir/package.json" ]; then
              echo "Installing in $dir"
              cd $dir && npm install && cd -
            fi
          done

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Python Dependencies
        run: |
          pip install --upgrade pip
          pip install -r services/ml-service/requirements.txt

      - name: Docker Login
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build Docker Images
        run: |
          echo "Building Docker images..."
          bash scripts/build-images.sh "$IMAGE_REGISTRY" "$IMAGE_TAG"

      - name: Push Docker Images
        run: |
          echo "Pushing Docker images..."
          bash scripts/push-images.sh "$IMAGE_REGISTRY" "$IMAGE_TAG"

      - name: Docker Logout
        run: docker logout